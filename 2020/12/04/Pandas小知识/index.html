        <p>写代码的一些常见技巧。</p>
<span id="more"></span>



<h3 id="修改所有行中的特定内容"><a href="#修改所有行中的特定内容" class="headerlink" title="修改所有行中的特定内容"></a>修改所有行中的特定内容</h3><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">data = pd.read_csv(<span class="string">&#x27;./train.csv&#x27;</span>, encoding = <span class="string">&#x27;big5&#x27;</span>)    <span class="comment"># 繁体字编码</span></span><br><span class="line">data = data.iloc[:, <span class="number">3</span>:]</span><br><span class="line"></span><br><span class="line"><span class="built_in">print</span>(data.iloc[:<span class="number">11</span>, :<span class="number">11</span>])	<span class="comment"># 打印一下前面几行，看看内容</span></span><br></pre></td></tr></table></figure>

<p><img src="https://i.loli.net/2021/04/27/RuCndGXjBv78UcA.png" alt="原始内容.png"></p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">data[data == <span class="string">&#x27;NR&#x27;</span>] = <span class="number">0</span>	<span class="comment"># 把所有行中内容为 NR 的都修改成数字 0</span></span><br><span class="line"></span><br><span class="line"><span class="built_in">print</span>(data.iloc[:<span class="number">11</span>, :<span class="number">11</span>])</span><br></pre></td></tr></table></figure>

<p><img src="https://i.loli.net/2021/04/27/A2W7UDinVgrNPkc.png" alt="修改行中内容.png"></p>
<hr>
